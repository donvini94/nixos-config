version: '3.8'

services:
  # VPN container - all torrent traffic goes through this
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:18080:18080"  # qBittorrent web UI (LOCALHOST ONLY) - SECURITY FIX
    volumes:
      - /var/lib/media-stack/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${MULLVAD_ADDRESSES}
      - WIREGUARD_ENDPOINT_PORT=51820
      - WIREGUARD_PUBLIC_KEY=/iivwlyqWqxQ0BVWmJRhcXIFdJeo0WbHQ/hZwuXaN3g=

      # DNS and firewall
      - SERVER_COUNTRIES=Switzerland,Netherlands  # Closest to your location
      - FIREWALL_INPUT_PORTS=18080  # Allow qBittorrent web UI
      - DOT=off
      - TZ=Europe/Amsterdam
    restart: unless-stopped
    networks:
      - media-network

  # qBittorrent - uses Gluetun's network stack (VPN-isolated)
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:libtorrentv1
    container_name: qbittorrent
    network_mode: "service:gluetun"  # Share Gluetun's network (VPN)
    environment:
      - PUID=1001  # jellyfin user ID
      - PGID=987  # jellyfin group ID
      - TZ=Europe/Berlin
      - WEBUI_PORT=18080
      - TORRENTING_PORT=6881
    volumes:
      - /var/lib/media-stack/qbittorrent:/config
      - /mnt/hetzner/downloads:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true  # Restart when dependency restarts
    restart: unless-stopped

  # Sonarr - TV show automation (uses regular internet)
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1001
      - PGID=987
      - TZ=Europe/Berlin
    volumes:
      - /var/lib/media-stack/sonarr:/config
      - /mnt/hetzner/shows:/tv
      - /mnt/hetzner/downloads:/downloads
    ports:
      - "127.0.0.1:18989:8989"  # LOCALHOST ONLY - SECURITY FIX
    restart: unless-stopped
    networks:
      - media-network

  # Radarr - Movie automation (uses regular internet)
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1001
      - PGID=987
      - TZ=Europe/Berlin
    volumes:
      - /var/lib/media-stack/radarr:/config
      - /mnt/hetzner/movies:/movies
      - /mnt/hetzner/downloads:/downloads
    ports:
      - "127.0.0.1:17878:7878"  # LOCALHOST ONLY - SECURITY FIX
    restart: unless-stopped
    networks:
      - media-network

  # Prowlarr - Indexer management (uses regular internet)
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1001
      - PGID=987
      - TZ=Europe/Berlin
    volumes:
      - /var/lib/media-stack/prowlarr:/config
    ports:
      - "127.0.0.1:19696:9696"  # LOCALHOST ONLY - SECURITY FIX
    restart: unless-stopped
    networks:
      - media-network

    # Bazarr - Subtitle management for TV shows and movies (uses regular internet)
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1001
      - PGID=987
      - TZ=Europe/Berlin
    volumes:
      - /var/lib/media-stack/bazarr:/config
      - /mnt/hetzner/movies:/movies
      - /mnt/hetzner/shows:/tv
    ports:
      - "127.0.0.1:16767:6767"  # LOCALHOST ONLY - SECURITY FIX
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    networks:
      - media-network

  # Jellyseerr - User request interface for Jellyfin (publicly accessible)
  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Berlin
      - PORT=5055
    volumes:
      - /var/lib/media-stack/jellyseerr:/app/config
    ports:
      - "127.0.0.1:5055:5055"  # LOCALHOST ONLY - Use nginx reverse proxy for public access
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - media-network

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1001  # jellyfin user ID
      - PGID=987   # jellyfin group ID
      - TZ=Europe/Berlin
    volumes:
      - /var/lib/media-stack/sabnzbd:/config
      - /mnt/hetzner/downloads:/downloads
      - /mnt/hetzner/downloads/incomplete:/incomplete-downloads  # Optional: separate incomplete
    ports:
      - "127.0.0.1:19090:8080"  # LOCALHOST ONLY - SECURITY FIX
    restart: unless-stopped
    networks:
      - media-network

networks:
  media-network:
    driver: bridge
